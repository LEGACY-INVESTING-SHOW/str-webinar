<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

@font-face{font-family:'Inter';font-style:normal;font-weight:400 800;font-display:swap;src:url('str/fonts/inter-latin.woff2') format('woff2')}
@font-face{font-family:'Poppins';font-style:normal;font-weight:700;font-display:swap;src:url('str/fonts/poppins-700-latin.woff2') format('woff2')}
@font-face{font-family:'Poppins';font-style:normal;font-weight:800;font-display:swap;src:url('str/fonts/poppins-800-latin.woff2') format('woff2')}

:root{
--paper:#f3efe8;
--paper-shell:#ece7df;
--card:#ffffff;
--ink:#171f2d;
--muted:#4d5a6e;
--line:#ddd4c7;
--green:#0f7b61;
--green-dark:#0a5a47;
--navy:#101b2b;
--display:'Poppins',sans-serif;
--body:'Inter',system-ui,sans-serif;
}

html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{
  font-family:var(--body);
  color:var(--ink);
  background:#f7f5f1;
}
img{display:block;max-width:100%}
a{color:inherit}

.page{
  width:min(1160px,calc(100% - 40px));
  margin:40px auto;
  padding:0 0 36px;
  background:var(--paper-shell);
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:18px 28px;
}
.brand{
  font-family:var(--display);
  font-size:14px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink);
}
.brand span{color:var(--green)}
.topbar a{
  text-decoration:none;
  font-size:14px;
  color:var(--muted);
}

.hero{
  padding:78px 28px 54px;
  text-align:center;
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  font-family:var(--display);
  font-size:12px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--green);
}
h1,h2,h3{
  font-family:var(--display);
  color:var(--ink);
  letter-spacing:-.03em;
}
h1{
  max-width:860px;
  margin:30px auto 0;
  font-size:clamp(42px,6vw,78px);
  line-height:.98;
  font-weight:800;
}
.wall{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
  padding:0 28px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 28px rgba(16,12,8,.05);
}
.video-shell{
  aspect-ratio:16/9;
  background:var(--navy);
}
.video-shell iframe{
  width:100%;
  height:100%;
  border:0;
  display:block;
}

footer{
  padding:22px 28px 0;
  text-align:center;
  font-size:12px;
  color:#6b716f;
}

@media(max-width:860px){
  .page{width:min(100% - 24px,1160px);margin:16px auto}
  .topbar{padding:16px 18px}
  .hero{padding:54px 18px 40px}
  .wall{grid-template-columns:1fr;padding:0 18px}
}

@media(max-width:560px){
  .page{width:100%;margin:0;padding-bottom:22px}
  .topbar{padding:14px 14px 0}
  .topbar a{display:none}
  .hero{padding:46px 14px 34px}
  .eyebrow{font-size:11px}
  h1{font-size:clamp(36px,14vw,58px)}
  .wall{padding:0 14px}
}
</style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="brand">Legacy Investing <span>Show</span></div>
    </div>

    <section class="hero">
      <h1>We Sat Down With Two Clients This Month - Here's What They Said</h1>
    </section>

    <section class="wall" aria-label="Student success story wall">
      <article class="card">
        <div class="video-shell">
          <iframe src="https://player.vimeo.com/video/1207905955?title=0&amp;byline=0&amp;portrait=0" title="Student success story video one" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe>
        </div>
      </article>

      <article class="card">
        <div class="video-shell">
          <iframe src="https://player.vimeo.com/video/1207909593?title=0&amp;byline=0&amp;portrait=0" title="Student success story video two" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe>
        </div>
      </article>
    </section>

    <footer>
      <p>&copy; 2026 Legacy Investing Show. All rights reserved. Results depend on effort, market, financing, local laws, tax situation, and execution. This page is educational and is not financial, tax, or legal advice.</p>
    </footer>
  </main>
</body>
